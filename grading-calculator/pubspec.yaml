name: grading_calculator
description: Professional Grading Calculator with Excel Import/Export
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # Excel Handling
  file_picker: ^5.5.0
  excel: ^4.0.6
  path_provider: ^2.1.0

  # Utilities
  intl: ^0.19.0
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/